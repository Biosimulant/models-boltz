schema_version: "2.0"
title: "Boltz: Boltz2AffinityPredictor"
description: "Wraps the native Boltz-2 CLI for single protein and single ligand affinity-focused structural runs."
package: "Biosimulant/models-boltz:labs/boltz-boltz2-affinity-predictor/models/core/model.yaml"
version: "7651a2829b60b601aef619a028a589b63d414c92"
standard: other
tags: [boltz, structural-biology, affinity, protein-ligand, gpu]
authors: ["Biosimulant Team"]
biosim:
  communication_step: 0.01
  entrypoint: "src.boltz2_affinity_predictor:Boltz2AffinityPredictor"
runtime:
  dependencies:
    packages:
      - boltz[cuda]==2.0.2
      - pyyaml==6.0.2
  remote:
    requirements:
      accelerator: gpu
      gpu_count: 1
    init_kwargs:
      runtime_mode: external
      cache_dir: "${REMOTE_EXECUTION_MOUNT_ROOT}/runtime-cache/boltz"
