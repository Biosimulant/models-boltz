description: Portable single-model Boltz-2 lab with a real protein-ligand affinity
  example intended for remote GPU execution and inline 3D structure visualization.
models:
- alias: boltz2_affinity
  parameters:
    accelerator: gpu
    default_ligand_smiles: N[C@@H](Cc1ccc(O)cc1)C(=O)O
    default_protein_sequence: 
    diffusion_samples: 1
    output_format: mmcif
    override: true
    recycling_steps: 3
    runtime_mode: managed
    sampling_steps: 200
    use_msa_server: true
  path: ../../labs/boltz-boltz2-affinity-predictor/models/core
package: Biosimulant/models-boltz/examples/boltz2-wiring
runtime:
  duration: 0.01
  communication_step: 0.01
  initial_inputs: {}
schema_version: '2.0'
scientific_context:
  assumptions:
  - Remote runs should use GPU-backed execution.
  - MSAs are generated through the configured MSA server for this example.
  expected_observables:
  - Affinity summary values from Boltz.
  - Confidence summary values from Boltz.
  - A renderable structure3d visual backed by a persisted artifact.
  mode: native-boltz
  question: Can Boltz-2 predict a protein-ligand complex remotely and return a renderable
    3D structure inside the desktop app?
title: Boltz-2 Remote Example
