schema_version: "2.0"
title: "Boltz: Real Protein-Ligand Affinity Run"
description: "Runnable space example that uses constructor defaults to execute the real upstream Boltz affinity example through the native managed-runtime BioModule."
package: "Biosimulant/models-boltz/examples/boltz2-wiring"
version: "7651a2829b60b601aef619a028a589b63d414c92-source-tree-1"
models:
  - path: models/boltz-boltz2-affinity-predictor
    alias: boltz2_affinity
    parameters:
      runtime_mode: managed
      use_msa_server: true
      accelerator: cpu
      output_format: mmcif
      default_protein_sequence: 
      default_ligand_smiles: N[C@@H](Cc1ccc(O)cc1)C(=O)O
runtime:
  duration: 0.01
  tick_dt: 0.01
  initial_inputs: {}
wiring: []
scientific_context:
  question: "Can the native Boltz-2 wrapper execute a real upstream protein-ligand affinity example inside a BioSim space without requiring a system-wide Boltz install?"
  mode: "native-boltz"
  assumptions:
    - "The model bootstraps a managed local Boltz runtime on first use."
    - "MSAs are generated through the configured MSA server in this example."
  expected_observables:
    - "Affinity summary JSON fields from Boltz."
    - "Top-model confidence summary JSON fields from Boltz."
    - "Absolute paths to generated structure, confidence, and affinity artifacts."
