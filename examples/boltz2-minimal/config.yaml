example_name: boltz2-minimal
description: Real Boltz-2 protein-ligand affinity example based on the upstream Boltz affinity example, using managed runtime installation and server-side MSA generation.
source:
  upstream_repo: https://github.com/jwohlwend/boltz
  upstream_example: examples/affinity.yaml
model:
  manifest_path: models/boltz-boltz2-affinity-predictor/model.yaml
  class: src.boltz2_affinity_predictor:Boltz2AffinityPredictor
  parameters:
    runtime_mode: managed
    use_msa_server: true
    accelerator: cpu
    output_format: mmcif
    override: true
    recycling_steps: 3
    sampling_steps: 200
    diffusion_samples: 1
  inputs:
    protein_sequence: 
    ligand_smiles: N[C@@H](Cc1ccc(O)cc1)C(=O)O
